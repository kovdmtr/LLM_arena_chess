<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }}{% endblock %}</title>
  <!-- Корень-относительный путь (не url_for): абсолютный URL от Starlette за nginx
       без X-Forwarded-Proto выходит http:// и блокируется как mixed content на HTTPS. -->
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <h1><a href="/">♟ LLM Chess Arena</a></h1>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
