{% extends "base.html" %}
{% block content %}
<section class="game-live" data-game-id="{{ game_id }}" data-white="{{ white }}" data-black="{{ black }}">
  <h2>{{ white }} <span class="vs">vs</span> {{ black }}</h2>
  <p id="live-status" class="live-status">Подключение…</p>
  <div class="live-layout">
    <div id="live-board" class="live-board">Ожидание позиции…</div>
    <div class="live-side">
      <div class="live-panel">
        <div class="live-panel-label">Ходы</div>
        <div id="live-moves" class="live-moves"></div>
      </div>
      <div class="live-panel">
        <div class="live-panel-label">Мысли модели</div>
        <div id="live-thoughts" class="live-thoughts">
          <p class="live-thoughts-empty">Партия ещё не началась…</p>
        </div>
      </div>
    </div>
  </div>
  <p class="hint">Просмотр идёт в реальном времени по WebSocket. По завершении
    партии страница сама откроет отчёт с анализом и интерактивным плеером.</p>
</section>

<script>
(function () {
  const root = document.querySelector(".game-live");
  const gameId = root.dataset.gameId;
  const whiteName = root.dataset.white;
  const blackName = root.dataset.black;
  const statusEl = document.getElementById("live-status");
  const boardEl = document.getElementById("live-board");
  const movesEl = document.getElementById("live-moves");
  const thoughtsEl = document.getElementById("live-thoughts");
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/games/${gameId}/ws`);
  let lastRow = null;

  function cell(cls, text) {
    const span = document.createElement("span");
    span.className = cls;
    span.textContent = text;
    return span;
  }

  function newRow(moveNo, whiteSan) {
    const row = document.createElement("div");
    row.className = "mv-row";
    row.appendChild(cell("mv-num", moveNo + "."));
    row.appendChild(cell("mv-w", whiteSan));
    row.appendChild(cell("mv-b", ""));
    movesEl.appendChild(row);
    return row;
  }

  // Ходы пишутся парами: белый открывает строку, чёрный дописывает её правую клетку.
  function addMove(p) {
    const isWhite = p.ply % 2 === 1;
    const moveNo = Math.floor((p.ply - 1) / 2) + 1;
    if (isWhite) {
      lastRow = newRow(moveNo, p.san);
    } else {
      if (!lastRow) lastRow = newRow(moveNo, "…");  // подстраховка
      lastRow.querySelector(".mv-b").textContent = p.san;
    }
    movesEl.querySelectorAll(".is-current").forEach(function (el) {
      el.classList.remove("is-current");
    });
    lastRow.querySelector(isWhite ? ".mv-w" : ".mv-b").classList.add("is-current");
    movesEl.scrollTop = movesEl.scrollHeight;
  }

  // Блок «мысли текущей модели»: рассуждение только что сходившей стороны.
  function showThoughts(p) {
    const isWhite = p.ply % 2 === 1;
    const moveNo = Math.floor((p.ply - 1) / 2) + 1;
    const num = isWhite ? (moveNo + ".") : (moveNo + "...");
    const who = isWhite ? whiteName : blackName;
    thoughtsEl.innerHTML = "";
    const head = document.createElement("div");
    head.className = "live-thoughts-head";
    head.textContent = num + " " + p.san + " · " + who;
    const body = document.createElement("p");
    body.className = "live-thoughts-body" + (p.reasoning ? "" : " empty");
    body.textContent = p.reasoning || "(без объяснения)";
    thoughtsEl.appendChild(head);
    thoughtsEl.appendChild(body);
  }

  // --- скольжение фигуры: наложение поверх доски едет from→to, затем доска
  //     подменяется снимком после хода (см. live.enrich_event/anim) ---
  const LIGHT = "#ffce9e", DARK = "#d18b47", ANIM_MS = 480, MOVE_GAP_MS = 140;

  function setBox(el, center, sq) {
    el.style.left = (center[0] * 100 - sq * 50) + "%";
    el.style.top = (center[1] * 100 - sq * 50) + "%";
    el.style.width = (sq * 100) + "%";
    el.style.height = (sq * 100) + "%";
  }

  function slide(anim, done) {
    const w = boardEl.clientWidth;
    const pieces = [];
    anim.moves.forEach(function (sub) {
      const patch = document.createElement("div");
      patch.className = "anim-patch";
      setBox(patch, sub.from, anim.sq);
      patch.style.background = sub.fromLight ? LIGHT : DARK;
      const pc = document.createElement("div");
      pc.className = "anim-piece";
      pc.innerHTML = sub.piece;
      setBox(pc, sub.from, anim.sq);
      pc._dx = (sub.to[0] - sub.from[0]) * w;
      pc._dy = (sub.to[1] - sub.from[1]) * w;
      boardEl.appendChild(patch);
      boardEl.appendChild(pc);
      pieces.push(pc);
    });
    void boardEl.offsetWidth;  // reflow, чтобы transition сработал
    pieces.forEach(function (pc) {
      pc.style.transform = "translate(" + pc._dx + "px," + pc._dy + "px)";
    });
    setTimeout(done, ANIM_MS);
  }

  function animateBoard(p, done) {
    if (!p.svg) { done(); return; }
    // Нет текущей доски (первый кадр) или нет данных анимации → меняем сразу.
    if (!boardEl.querySelector("svg") || !p.anim) {
      boardEl.innerHTML = p.svg;
      done();
      return;
    }
    slide(p.anim, function () { boardEl.innerHTML = p.svg; done(); });
  }

  // Кадры обрабатываются по одному (очередь) — так буферный «залп» ходов
  // проигрывается размеренно, а не мгновенно.
  const queue = [];
  let busy = false;

  function pump() {
    if (busy) return;
    const msg = queue.shift();
    if (!msg) return;
    handle(msg);
  }

  function handle(msg) {
    const p = msg.payload || {};
    if (msg.type === "move") {
      busy = true;
      addMove(p);
      showThoughts(p);
      animateBoard(p, function () {
        setTimeout(function () { busy = false; pump(); }, MOVE_GAP_MS);
      });
      return;
    }
    if (p.svg) boardEl.innerHTML = p.svg;
    if (msg.type === "game_start") {
      statusEl.textContent = "Партия идёт…";
    } else if (msg.type === "status") {
      statusEl.textContent = `Завершено: ${p.result} (${p.termination || p.status})` +
        " — открываю анализ…";
      // Партия окончена → перезагружаем страницу: тот же URL отдаст отчёт с анализом.
      setTimeout(function () { location.reload(); }, 1500);
    } else if (msg.type === "error") {
      statusEl.textContent = "Ошибка: " + (p.message || "неизвестная");
    }
    pump();
  }

  ws.onmessage = function (event) {
    queue.push(JSON.parse(event.data));
    pump();
  };
  ws.onclose = function () {
    if (statusEl.textContent === "Подключение…") statusEl.textContent = "Соединение закрыто.";
  };
})();
</script>
{% endblock %}
