# LLM Chess Arena — несекретная конфигурация.
# Секреты (API-ключи) — только в .env (см. .env.example). Здесь хранятся имена
# переменных окружения (api_key_env), а не их значения.

arena:
  illegal_move_retries: 3        # попыток до технического поражения
  hints_per_player: 3
  auto_claim_draws: true         # авто-ничья при 50-ходовом/троекратном повторении
  include_legal_moves: false     # класть ли список легальных ходов в промпт; false —
                                 # модель ходит по FEN/PGN, легальность проверяется после хода (D-021)

engine:
  enabled: true
  path: "stockfish"              # путь к бинарнику или имя в PATH
  analysis_depth: 18
  hint_depth: 18

retry:                           # повтор вызова провайдера при временных сбоях (Phase 7)
  attempts: 3                    # всего попыток (1 = без повторов)
  base_delay: 0.5                # старт экспоненциального backoff, сек
  max_delay: 8.0                 # потолок задержки, сек
  multiplier: 2.0                # множитель backoff между попытками
  jitter: 0.1                    # доля размытия задержки [0..1], чтобы избежать синхронных повторов

analysis:                        # ★ пороги классификации ходов (centipawn loss, D-009)
  enabled: true
  inaccuracy_cp: 50              # cpl ≥ — неточность
  mistake_cp: 120               # cpl ≥ — ошибка
  blunder_cp: 300               # cpl ≥ — зевок
  brilliant_max_cpl: 10         # «блестящий»: ход почти лучший (cpl ≤ этого) …
  brilliant_min_eval_cp: 100    # … + жертва материала при сохранении перевеса (≥ этого)

providers:                       # имя провайдера = имя реализации (register_provider)
  openai:    { api_key_env: OPENAI_API_KEY }
  anthropic: { api_key_env: ANTHROPIC_API_KEY }
  gemini:    { api_key_env: GOOGLE_API_KEY }   # реализация зарегистрирована как 'gemini' (D-018)

models:                          # каталог выбираемых моделей
  - id: gpt-4o
    provider: openai
    display_name: "GPT-4o"
    params: { temperature: 0.2, max_tokens: 1024 }
  - id: claude-opus-4-8
    provider: anthropic
    display_name: "Claude Opus 4.8"
    params: { temperature: null, max_tokens: 1024 }   # эта модель отвергает temperature (400)
  - id: gemini-2.5-pro
    provider: gemini
    display_name: "Gemini 2.5 Pro"
    params: { temperature: 0.2, max_tokens: 1024 }

output:
  games_dir: "games"
